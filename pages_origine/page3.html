<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartes - Biomimétisme</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white; 
            box-sizing: border-box;
            overflow: hidden; 
            
            background-color: #F4F1EA; 
            background-image: url("image/fond du jeu.jpg"); 
            background-size: contain; 
            background-position: center; 
            background-repeat: no-repeat; 
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            z-index: 1; 
            pointer-events: none; 
        }

        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }

        .card {
            position: absolute;
            width: 150px;
            height: 223px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            cursor: pointer;
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            
            transition: transform 0.4s ease, box-shadow 0.4s ease, opacity 0.4s ease;
            box-sizing: border-box;
            z-index: 10; 
        }

        .card:not(.active):hover {
            transform: scale(1.20);
            box-shadow: 0 16px 32px rgba(0,0,0,0.7);
            z-index: 50; 
        }

        .card.active {
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(255,255,255,0.3);
            animation: coolVibe 0.4s ease-in-out infinite;
            z-index: 40; 
        }

        .card.matched {
            transform: scale(0);
            opacity: 0;
            pointer-events: none;
            animation: none;
        }

        @keyframes coolVibe {
            0%, 100% { transform: scale(1.1) translate(0, 0); }
            25% { transform: scale(1.1) translate(-2px, 0); }
            50% { transform: scale(1.1) translate(0, -1px); }
            75% { transform: scale(1.1) translate(2px, 0); }
        }

        /* ZONE DE DESSIN DU JOUEUR */
        #drawing-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 60; 
            transition: opacity 0.3s ease;
        }

        #connecting-line {
            fill: none;
            stroke-linecap: round;
            opacity: 0;
            transition: stroke 0.3s ease, opacity 0.2s ease; 
        }

        #connecting-line.tracking { opacity: 1; stroke: rgba(255, 255, 255, 0.4); }
        #connecting-line.success { opacity: 1; stroke: #2ecc71; }
        #connecting-line.error { opacity: 1; stroke: #e74c3c; }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 500;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            cursor: pointer;
        }

        #overlay.show { opacity: 1; visibility: visible; }

        /* ZONE DES DÉCORATIONS */
        #decorations-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 600; 
            pointer-events: none;
        }

        .deco-path {
            fill: none;
            stroke-linecap: round;
            animation: drawDeco forwards; 
        }

        @keyframes drawDeco { to { stroke-dashoffset: 0; } }

        /* STYLE DES POP-UPS */
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            border-radius: 30px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            z-index: 1000; 
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .popup.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }

        .popup.error {
            padding: 40px 60px;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(135deg, #f44336, #c62828);
            border: 3px solid white;
            color: white;
            border-radius: 50px;
        }

        .popup.success-large {
            width: 800px;
            max-width: 90vw;
            background-color: #2c3e50;
            border: 4px solid gold;
            display: flex;
            flex-direction: column;
        }

        .success-text-area {
            padding: 40px;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #ecf0f1;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            text-align: justify;
        }

        .success-character-area {
            display: flex;
            align-items: center;
            padding: 30px;
            background-color: #ecf0f1;
            gap: 20px;
        }

        .character {
            width: 120px;
            height: 120px;
            background-color: #34495e;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            flex-shrink: 0;
        }

        .bubble {
            background-color: white;
            border-radius: 20px;
            padding: 15px;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            flex-grow: 1;
            display: flex;
            justify-content: center;
        }

        .bubble::before {
            content: '';
            position: absolute;
            left: -15px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 15px 15px 15px 0;
            border-style: solid;
            border-color: transparent white transparent transparent;
        }

        .bubble img {
            max-height: 150px;
            border-radius: 10px;
            object-fit: contain;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10;
            color: #2c3e50; 
            background-color: rgba(0, 0, 0, 0.08);
        }

        .close-btn:hover { background-color: rgba(0, 0, 0, 0.15); transform: scale(1.1); }
        .popup.error .close-btn { color: white; background-color: rgba(255, 255, 255, 0.2); }
        .popup.error .close-btn:hover { background-color: rgba(255, 255, 255, 0.4); }
        .hide { display: none !important; }
    </style>
</head>
<body>

    <svg id="drawing-area">
        <path id="connecting-line" d=""></path>
    </svg>

    <div id="overlay"></div>

    <svg id="decorations-area"></svg>

    <div id="game-popup" class="popup">
        <span id="close-popup" class="close-btn">&times;</span>
        <div id="error-content"><span id="error-text">Aïe... C'est raté !</span></div>
        <div id="success-content" class="hide">
            <div class="success-character-area">
                <div class="character">👨‍🔬</div>
                <div class="bubble"><img id="success-image" src="" alt="Image de la bulle"></div>
            </div>
            <div class="success-text-area" id="success-description"></div>
        </div>
    </div>

    <div class="container" id="card-container">
        <div class="card" data-pair="tus" style="background-image: url('image/lotus.png');"></div>
        <div class="card" data-pair="tus" style="background-image: url('image/surface\ hydrophobe.png');"></div>
        <div class="card" data-pair="gecko" style="background-image: url('image/manchot.png');"></div>
        <div class="card" data-pair="gecko" style="background-image: url('image/District.png');"></div>
        <div class="card" data-pair="papillon" style="background-image: url('image/moule.png');"></div>
        <div class="card" data-pair="papillon" style="background-image: url('image/colle\ glue.png');"></div>
        <div class="card" data-pair="coleoptere" style="background-image: url('image/zèbre.png');"></div>
        <div class="card" data-pair="coleoptere" style="background-image: url('image/CAMOUFLAGE.png');"></div>
        <div class="card" data-pair="lotus" style="background-image: url('image/os.png');"></div>
        <div class="card" data-pair="lotus" style="background-image: url('image/tour-eiffel.png');"></div>
        <div class="card" data-pair="aile" style="background-image: url('image/aile\ de\ papillon.png');"></div>
        <div class="card" data-pair="aile" style="background-image: url('image/panel.png');"></div>
        <div class="card" data-pair="or" style="background-image: url('image/orchidée.png');"></div>
        <div class="card" data-pair="or" style="background-image: url('image/garden.png');"></div>
    </div>

    <script>
        const infosBiomimetisme = {
            "tus": { texte: "Le Martin-pêcheur a inspiré la forme du train à grande vitesse japonais, le Shinkansen ! Son bec aérodynamique lui permet de plonger dans l'eau sans éclaboussures. Appliquée au train, cette forme évite le 'boom' sonore à la sortie des tunnels et économise 15% d'électricité.", image: "image/lotus.png" },
            "gecko": { texte: "Les pattes du Gecko sont recouvertes de millions de poils microscopiques qui créent des liaisons directes avec les molécules du mur. C'est ce qu'on appelle les forces de Van der Waals. Des chercheurs s'en sont inspirés pour créer des adhésifs ultra-puissants sans utiliser la moindre colle !", image: "image/manchot.png" },
            "papillon": { texte: "Les yeux de certains papillons de nuit absorbent la lumière au lieu de la refléter, pour ne pas être repérés par les prédateurs. Cette nanostructure a été copiée pour créer les traitements anti-reflets de nos lunettes et des panneaux solaires !", image: "image/moule.png" },
            "coleoptere": { texte: "Le coléoptère du désert de Namibie récupère l'eau du brouillard grâce aux micro-bosses de sa carapace. Des scientifiques s'en sont inspirés pour tisser des filets spéciaux capables de capturer l'eau potable dans l'air pour les régions arides.", image: "image/zèbre.png" },
            "lotus": { texte: "L'effet Lotus : les feuilles de cette plante sont super-hydrophobes. L'eau glisse dessus en emportant la saleté. Cette texture a permis d'inventer des verres et des peintures auto-nettoyantes pour nos fenêtres !", image: "image/os.png" },
            "aile": { texte: "Les rayures du zèbre créent des micro-courants d'air qui rafraîchissent sa peau, mais elles agissent aussi comme un camouflage optique contre les insectes piqueurs ! L'armée a parfois utilisé des motifs similaires de camouflage disruptif, appelés 'Dazzle', notamment sur des tanks ou des navires.", image: "image/aile\ de\ papillon.png" },
            "or": { texte: "La peau de requin est recouverte de minuscules écailles striées appelées denticules dermiques. Elles réduisent considérablement la traînée dans l'eau. Des ingénieurs s'en sont inspirés pour concevoir des combinaisons de natation ultra-rapides et des revêtements spéciaux pour les coques de bateaux !", image: "image/orchidée.png" }
        };

        const popup = document.getElementById('game-popup');
        const overlay = document.getElementById('overlay');
        const closeBtn = document.getElementById('close-popup');
        const errorContent = document.getElementById('error-content');
        const successContent = document.getElementById('success-content');
        const successDescription = document.getElementById('success-description');
        const successImage = document.getElementById('success-image');
        const connectionLine = document.getElementById('connecting-line');
        const decorationsArea = document.getElementById('decorations-area');

        let selectedCards = [];
        let lockBoard = false;
        let isCurrentMatch = false;
        let startX = 0;
        let startY = 0;

        // 🟢 NOUVELLE LOGIQUE : Grille en quinconce 5-4-5 (exactement 14 cartes) 🟢
        function shuffleAndScatterCards() {
            const container = document.getElementById('card-container');
            const cards = Array.from(document.querySelectorAll('.card'));
            
            // Mélange des cartes
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            cards.forEach(card => container.appendChild(card));

            const cardW = 150;
            const cardH = 223;

            // Définition de la structure des lignes : 5 cartes, puis 4, puis 5 = 14 cartes au total
            const rowCounts = [5, 4, 5]; 
            const rows = rowCounts.length;
            const cellH = window.innerHeight / rows;

            let cardIndex = 0;

            // On boucle sur chaque ligne
            rowCounts.forEach((cols, rowIndex) => {
                // On divise la largeur de l'écran par le nombre de cartes de CETTE ligne
                const cellW = window.innerWidth / cols;

                for (let colIndex = 0; colIndex < cols; colIndex++) {
                    if (cardIndex >= cards.length) return; // Sécurité

                    const card = cards[cardIndex];

                    // Coordonnées du centre de la case virtuelle pour cette carte
                    let baseX = (colIndex * cellW) + (cellW - cardW) / 2;
                    let baseY = (rowIndex * cellH) + (cellH - cardH) / 2;

                    // Marge pour ne pas sortir de la case (15px)
                    const maxOffsetX = Math.max(0, (cellW - cardW) / 2 - 15); 
                    const maxOffsetY = Math.max(0, (cellH - cardH) / 2 - 15);

                    // Décalage aléatoire
                    const randomOffsetX = (Math.random() * 2 - 1) * maxOffsetX;
                    const randomOffsetY = (Math.random() * 2 - 1) * maxOffsetY;

                    card.style.left = `${baseX + randomOffsetX}px`;
                    card.style.top = `${baseY + randomOffsetY}px`;

                    cardIndex++;
                }
            });
        }

        window.addEventListener('DOMContentLoaded', shuffleAndScatterCards);
        window.addEventListener('resize', shuffleAndScatterCards);

        function generateSimpleWavyPath(x1, y1, x2, y2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const ctrl1X = x1 + dx * 0.2;
            const ctrl1Y = y1 - 150; 
            const ctrl2X = x2 - dx * 0.2;
            const ctrl2Y = y2 + 150;
            return `M ${x1} ${y1} C ${ctrl1X} ${ctrl1Y}, ${ctrl2X} ${ctrl2Y}, ${x2} ${y2}`;
        }

        function generateWildWavyPath(x1, y1, x2, y2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const chaosX = (Math.random() - 0.5) * 1000;
            const chaosY = (Math.random() - 0.5) * 1000;
            const ctrl1X = x1 + dx * 0.3 + chaosX;
            const ctrl1Y = y1 + dy * 0.3 + chaosY; 
            const ctrl2X = x2 - dx * 0.3 - chaosX;
            const ctrl2Y = y2 - dy * 0.3 - chaosY;
            return `M ${x1} ${y1} C ${ctrl1X} ${ctrl1Y}, ${ctrl2X} ${ctrl2Y}, ${x2} ${y2}`;
        }

        function spawnDecorations() {
            decorationsArea.innerHTML = ''; 
            const colors = ['#f39c12', '#3498db', '#e74c3c', '#9b59b6', '#2ecc71', '#ff7979', '#badc58'];
            const thickness = '20px'; 
            const duration = 15;      

            for (let i = 0; i < 10; i++) {
                const x1 = Math.random() * window.innerWidth;
                const y1 = Math.random() * window.innerHeight;
                const x2 = x1 + (Math.random() - 0.5) * 1500;
                const y2 = y1 + (Math.random() - 0.5) * 1500;
                
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute('d', generateWildWavyPath(x1, y1, x2, y2));
                path.setAttribute('stroke', colors[Math.floor(Math.random() * colors.length)]);
                path.classList.add('deco-path');
                
                path.style.strokeWidth = thickness;
                path.style.opacity = Math.random() * 0.3 + 0.5;
                
                const delay = Math.random() * 0.5; 
                path.style.animationDuration = `${duration}s`;
                path.style.animationDelay = `${delay}s`;
                path.style.animationTimingFunction = "cubic-bezier(0.4, 0, 0.2, 1)";
                
                decorationsArea.appendChild(path); 
                const length = path.getTotalLength();
                path.style.strokeDasharray = length;
                path.style.strokeDashoffset = length;
            }
        }

        document.addEventListener('mousemove', (e) => {
            if (selectedCards.length === 1 && !lockBoard) {
                connectionLine.setAttribute('d', generateSimpleWavyPath(startX, startY, e.clientX, e.clientY));

                const card1 = selectedCards[0];
                let closestCard = null;
                let minDist = Infinity;
                
                const cards = document.querySelectorAll('.card');
                cards.forEach(card => {
                    if (card !== card1 && !card.classList.contains('matched')) {
                        const rect = card.getBoundingClientRect();
                        const centerX = rect.left + rect.width / 2;
                        const centerY = rect.top + rect.height / 2;
                        const dist = Math.hypot(centerX - e.clientX, centerY - e.clientY);

                        if (dist < minDist) {
                            minDist = dist;
                            closestCard = card;
                        }
                    }
                });

                if (closestCard) {
                    const effectRadius = 300;
                    let normalizedDist = Math.min(minDist, effectRadius) / effectRadius; 

                    if (closestCard.dataset.pair === card1.dataset.pair) {
                        let thickness = 4 + (1 - normalizedDist) * 12; 
                        connectionLine.style.strokeWidth = thickness;
                    } else {
                        let thickness = 4 - (1 - normalizedDist) * 3; 
                        connectionLine.style.strokeWidth = Math.max(1, thickness);
                    }
                }
            }
        });

        function showPopup(type, pairId = null) {
            popup.classList.remove('error', 'success-large', 'show');

            if (type === 'error') {
                errorContent.classList.remove('hide');
                successContent.classList.add('hide');
                popup.classList.add('error');
            } else if (type === 'success') {
                errorContent.classList.add('hide');
                successContent.classList.remove('hide');
                popup.classList.add('success-large');

                if (infosBiomimetisme[pairId]) {
                    successDescription.textContent = infosBiomimetisme[pairId].texte;
                    successImage.src = infosBiomimetisme[pairId].image;
                }
            }

            spawnDecorations();
            popup.classList.add('show');
            overlay.classList.add('show');
        }

        function fermerPopup() {
            if (!popup.classList.contains('show')) return; 

            popup.classList.remove('show');
            overlay.classList.remove('show');
            decorationsArea.innerHTML = ''; 

            const card1 = selectedCards[0];
            const card2 = selectedCards[1];

            if (isCurrentMatch) {
                card1.classList.remove('active');
                card2.classList.remove('active');
                card1.classList.add('matched');
                card2.classList.add('matched');
            } else {
                card1.classList.remove('active');
                card2.classList.remove('active');
            }

            resetBoard();
        }

        closeBtn.addEventListener('click', fermerPopup);
        overlay.addEventListener('click', fermerPopup);

        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', () => {
                if (lockBoard) return;
                if (card.classList.contains('active') || card.classList.contains('matched')) return;

                card.classList.add('active');
                selectedCards.push(card);

                if (selectedCards.length === 1) {
                    const rect = card.getBoundingClientRect();
                    startX = rect.left + rect.width / 2;
                    startY = rect.top + rect.height / 2;
                    
                    connectionLine.setAttribute('d', generateSimpleWavyPath(startX, startY, startX, startY));
                    connectionLine.classList.remove('success', 'error');
                    connectionLine.classList.add('tracking');
                    connectionLine.style.strokeWidth = '4';
                }

                if (selectedCards.length === 2) {
                    lockBoard = true;
                    
                    const rect2 = card.getBoundingClientRect();
                    const endX = rect2.left + rect2.width / 2;
                    const endY = rect2.top + rect2.height / 2;
                    
                    connectionLine.setAttribute('d', generateSimpleWavyPath(startX, startY, endX, endY));
                    
                    if (selectedCards[0].dataset.pair === selectedCards[1].dataset.pair) {
                        connectionLine.style.strokeWidth = '16';
                    } else {
                        connectionLine.style.strokeWidth = '2';
                    }
                    
                    checkForMatch();
                }
            });
        });

        function checkForMatch() {
            const card1 = selectedCards[0];
            const card2 = selectedCards[1];
            
            const pairId = card1.dataset.pair;
            isCurrentMatch = (pairId === card2.dataset.pair);

            if (isCurrentMatch) {
                connectionLine.classList.remove('tracking');
                connectionLine.classList.add('success');
                setTimeout(() => { showPopup('success', pairId); }, 700);
            } else {
                connectionLine.classList.remove('tracking');
                connectionLine.classList.add('error');
                setTimeout(() => { showPopup('error'); }, 700);
            }
        }

        function resetBoard() {
            selectedCards = [];
            lockBoard = false;
            connectionLine.classList.remove('tracking', 'success', 'error');
            connectionLine.setAttribute('d', '');
        }
    </script>

</body>
</html>
